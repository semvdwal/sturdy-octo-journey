# This is the correct and documented way to force Quarkus to index an external JAR
# that does not ship its own META-INF/jandex.idx.
#
# BUG: These properties are silently ignored during the augmentation phase because
# application.properties is not yet loaded when IndexDependencyBuildItem entries
# are collected. The build will therefore fail with:
#
#   IllegalStateException: 'io.strimzi.api.kafka.model.topic.KafkaTopic' has not been
#   found in the Jandex index so it cannot be introspected.
#
# WORKAROUND: Define these as <systemProperties> in the quarkus-maven-plugin config
# in pom.xml (see the commented-out block), or pass them via -D on the command line:
#
#   mvn clean package \
#     -Dquarkus.index-dependency.strimzi-api.group-id=io.strimzi \
#     -Dquarkus.index-dependency.strimzi-api.artifact-id=api
#
quarkus.index-dependency.strimzi-api.group-id=io.strimzi
quarkus.index-dependency.strimzi-api.artifact-id=api